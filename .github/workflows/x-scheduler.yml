name: X予約投稿ランナー

on:
  schedule:
    # GitHub Actionsの混雑を避けつつ、5分ごとに予約キューを確認する。
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

concurrency:
  group: x-scheduler
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.jsバージョン確認
        run: node --version

      - name: X予約投稿スケジューラーを実行
        id: run_scheduler
        continue-on-error: true
        run: node x-scheduler-runner.js

      - name: 更新されたスケジュールをコミットしてプッシュ
        if: always()
        run: |
          git config user.name "X Scheduler Bot"
          git config user.email "xscheduler@umbrella-parade.local"
          git add x-scheduled-posts.json
          if git diff --staged --quiet; then
            echo "スケジュールに変更なし"
          else
            git commit -m "chore: 予約投稿スケジュール更新 [skip ci]"
            git push
            echo "スケジュールを更新してプッシュしました"
          fi

      - name: スケジューラー失敗を最終ステータスへ反映
        if: steps.run_scheduler.outcome == 'failure'
        run: exit 1
